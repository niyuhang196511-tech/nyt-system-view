# user  nobody;
worker_processes 5;

# error_log  logs/error.log;
# pid        logs/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;

  server_names_hash_bucket_size 64;

  # -------------------------
  # Proxy cache (Windows path - must exist)
  # Move cache definition to top of http{} block
  # -------------------------
  proxy_cache_path D:/nginx_cache levels=1:2 keys_zone=my_cache:100m inactive=30m max_size=1g;

  # set log format (ASCII-safe)
  log_format main '[$upstream_addr] $remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log logs/access.log main;

  # default charset
  charset utf-8;

  # request buffering / timeouts
  client_header_buffer_size 1k;
  large_client_header_buffers 4 4k;

  client_header_timeout 3m;
  client_body_timeout 3m;
  send_timeout 3m;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  # gzip settings (improved)
  gzip on;
  gzip_min_length 1100;
  gzip_buffers 4 8k;
  gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 2;

  output_buffers 1 32k;
  postpone_output 1460;

  client_max_body_size 1000m;

  proxy_ignore_client_abort on;

  # -------------------------
  # server blocks
  # -------------------------

  server {
    listen 9527;
    server_name localhost;

    location / {
      root html/nyt_pc;
      index index.html index.htm;
      try_files $uri $uri/ /index.html?s=$uri&$args;
    }

    location /prod-api/ {
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header REMOTE-HOST $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://127.0.0.1:8082/;
    }
  }

  upstream pc {
    server 127.0.0.1:9527;
  }


  server {
    listen 443 ssl;
    server_name nytpc.jundaoxin.com;

    charset utf-8;
    ssl_certificate "cret/nytpc.jundaoxin.com.pem";
    ssl_certificate_key "cret/nytpc.jundaoxin.com.key";
    ssl_session_cache shared:SSL:1m;
    ssl_session_timeout 5m;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    if ($time_iso8601 ~ "(\d{4})-(\d{2})-(\d{2})") {
      set $time $1$2$3;
    }

    access_log logs/zkty.access.${time}.log main;
    add_header Cache-Control no-cache;
    add_header Cache-Control private;
    add_header X-Xss-Protection "1;mode=block";
    add_header X-Content-Type-Options nosniff;

    location / {
      proxy_pass http://pc;
    }
  }

  # 官网
  upstream site {
    server 127.0.0.1:3000;
  }

  server {
    listen 443 ssl;
    server_name www.jundaoxin.com jundaoxin.com;

    charset utf-8;
    ssl_certificate "cret/www.jundaoxin.com.pem";
    ssl_certificate_key "cret/www.jundaoxin.com.key";
    ssl_session_cache shared:SSL:1m;
    ssl_session_timeout 5m;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    if ($time_iso8601 ~ "(\d{4})-(\d{2})-(\d{2})") {
      set $time $1$2$3;
    }

    access_log logs/jundaoxin.access.${time}.log main;
    add_header Cache-Control no-cache;
    add_header Cache-Control private;
    add_header X-Xss-Protection "1;mode=block";
    add_header X-Content-Type-Options nosniff;

    location / {
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header REMOTE-HOST $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://127.0.0.1:3000;
    }

    location /app-api/ {
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header REMOTE-HOST $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://127.0.0.1:48080/app-api/;
    }
  }

  # nyt 管理后台
  server {
    listen 9999;
    server_name localhost;

    location / {
      root html/nyt_system;
      index index.html index.htm;
      try_files $uri $uri/ /index.html;
    }

    location /admin-api/ {
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header REMOTE-HOST $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://127.0.0.1:48080/admin-api/;
    }

    location /app-api/ {
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header REMOTE-HOST $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://127.0.0.1:48080/app-api/;
    }
  }
}

stream {
  upstream mysql_proxy {
    hash $remote_addr consistent;
    server 127.0.0.1:3306 weight=5 max_fails=3 fail_timeout=30s;
  }

  server {
    listen 50000; # database proxy port
    proxy_connect_timeout 10s;
    proxy_timeout 300s;
    proxy_pass mysql_proxy;
  }

  upstream mysql8_proxy {
    hash $remote_addr consistent;
    server 127.0.0.1:3307 weight=5 max_fails=3 fail_timeout=30s;
  }

  server {
    listen 50001; # database proxy port
    proxy_connect_timeout 10s;
    proxy_timeout 300s;
    proxy_pass mysql8_proxy;
  }
}
